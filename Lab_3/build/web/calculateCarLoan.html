<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Car Loan Calculation</title>
    <style>
        body {
            font-family: serif;
        }
        fieldset {
            width: 350px;
            border: 1px solid #a9a9a9;
            padding: 10px;
        }
        legend {
            font-weight: bold;
            padding: 0 5px;
        }
        .footer {
            margin-top: 10px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h2>Perform Car Loan Calculation</h2>

    <form action="processCalculateCarLoan.jsp" method="get">
        <fieldset>
            <legend>Loan Calculation</legend>
            <table>
                <tr>
                    <td>Loan Amount *</td>
                    <td>
                        <input type="text" name="amount" placeholder="Amount" required />
                    </td>
                </tr>
                <tr>
                    <td>Period</td>
                    <td>
                        <select name="period">
                            <option value="3">3 years</option>
                            <option value="4">4 years</option>
                            <option value="5">5 years</option>
                            <option value="7">7 years</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="padding-top: 10px;">
                        <input type="submit" value="Submit" />
                        <input type="reset" value="Cancel" />
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>

    <div class="footer">
        &copy;2026-Syaffiq
    </div>

</body>
</html>
